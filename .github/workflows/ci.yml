name: CI

# Runs on PRs to staging and main.
# Deploys to staging and production are separate workflows:
#   - deploy-staging.yml   (push to `staging`)
#   - deploy-production.yml (push to `main`)
on:
  pull_request:
    branches: [main, staging]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit)
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://fake:fake@fake:5432/fake
          BETTER_AUTH_SECRET: ci_secret_at_least_32_chars_long_xx
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_STOREFRONT_BASE_DOMAIN: localhost:3001

  # e2e job removed — re-add when seed data + tenant subdomain test setup are ready.
  # Existing tests in apps/*/tests/e2e/ are mostly .skip() placeholders.
