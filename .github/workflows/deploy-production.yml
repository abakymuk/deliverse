name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Production deploys never cancelled mid-flight

jobs:
  migrate:
    name: Migrate production DB
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # CRITICAL: GitHub environment `production` requires manual approval.
    # Configure in repo Settings → Environments → production → Required reviewers.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations against production DB
        run: doppler run --token=${{ secrets.DOPPLER_TOKEN_PRD }} -- pnpm db:migrate
        env:
          DOPPLER_PROJECT: restaurant-platform
          DOPPLER_CONFIG: prd

      - name: Verify migration succeeded
        run: |
          echo "Migration job complete. If this step is reached, all migrations applied successfully."

  deploy-platform:
    name: Deploy platform to production
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_PLATFORM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-storefront:
    name: Deploy storefront to production
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_STOREFRONT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  smoke-test:
    name: Smoke test production
    needs: [deploy-platform, deploy-storefront]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for CDN propagation
        run: sleep 30

      - name: Platform health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://admin.yourapp.com/login)
          if [ "$STATUS" -ne 200 ]; then
            echo "Platform health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Platform OK"

  release-marker:
    name: Mark release in Sentry/PostHog
    needs: smoke-test
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking; release tracking is optional
    steps:
      - name: Create Sentry release
        run: echo "TODO: integrate with Sentry CLI when Sentry is set up"
      - name: Create PostHog annotation
        run: echo "TODO: PostHog deploy annotation"
