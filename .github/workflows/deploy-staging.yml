name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false  # Don't cancel mid-deploy; queue instead

jobs:
  migrate:
    name: Migrate staging DB
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations against staging DB
        run: doppler run --token=${{ secrets.DOPPLER_TOKEN_STG }} -- pnpm db:migrate
        env:
          DOPPLER_PROJECT: deliverse
          DOPPLER_CONFIG: stg

      # Seed is idempotent (`onConflictDoNothing` + targeted UPDATEs for
      # name convergence per DEL-25). Running on every deploy ensures the
      # canonical dataset (hospitality-group + menus, OOMI Kitchen demo
      # tenant + brands + menus, etc.) stays in sync with seed.ts.
      # SEED_TEST_FIXTURES intentionally left unset on stg — the test-only
      # multi-brand cart fixture is dev/CI only.
      - name: Seed staging DB
        run: doppler run --token=${{ secrets.DOPPLER_TOKEN_STG }} -- pnpm db:seed
        env:
          DOPPLER_PROJECT: deliverse
          DOPPLER_CONFIG: stg

  deploy-platform:
    name: Deploy platform to staging
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_PLATFORM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes)
          vercel alias set $DEPLOYMENT_URL admin.staging.deliverse.app --token=${{ secrets.VERCEL_TOKEN }} --scope=$VERCEL_ORG_ID

  deploy-storefront:
    name: Deploy storefront to staging
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_STOREFRONT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes)
          # Storefront alias is wildcard — Vercel handles routing per-subdomain at the edge
          vercel alias set $DEPLOYMENT_URL staging.deliverse.app --token=${{ secrets.VERCEL_TOKEN }} --scope=$VERCEL_ORG_ID

  smoke-test:
    name: Smoke test staging
    needs: [deploy-platform, deploy-storefront]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for DNS / CDN propagation
        run: sleep 30

      - name: Platform health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://admin.staging.deliverse.app/login)
          if [ "$STATUS" -ne 200 ]; then
            echo "Platform health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Platform OK"

      # Storefront smoke test requires a brand subdomain — skip if no seed brands deployed yet
      # Uncomment when ready:
      # - name: Storefront health check
      #   run: |
      #     STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pizza-express.staging.deliverse.app/)
      #     if [ "$STATUS" -ne 200 ]; then
      #       echo "Storefront health check failed: HTTP $STATUS"
      #       exit 1
      #     fi
      #     echo "Storefront OK"
